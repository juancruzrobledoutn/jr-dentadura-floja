<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sin Conexión - Sabor</title>
  <meta name="theme-color" content="#f97316">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --bg-dark: #0a0a0a;
      --bg-card: #18181b;
      --bg-elevated: #27272a;
      --text-primary: #fafafa;
      --text-muted: #a1a1aa;
      --border: #3f3f46;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-bottom: env(safe-area-inset-bottom, 1.5rem);
    }

    /* Offline Content */
    .offline-content {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    /* Animated WiFi Icon */
    .offline-icon {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
    }

    .wifi-circle {
      position: absolute;
      left: 50%;
      bottom: 30%;
      transform: translateX(-50%);
      border: 3px solid var(--primary);
      border-radius: 50%;
      opacity: 0;
      animation: pulse-out 2s infinite ease-out;
    }

    .wifi-circle:nth-child(1) {
      width: 40px;
      height: 40px;
      animation-delay: 0s;
    }
    .wifi-circle:nth-child(2) {
      width: 70px;
      height: 70px;
      animation-delay: 0.3s;
    }
    .wifi-circle:nth-child(3) {
      width: 100px;
      height: 100px;
      animation-delay: 0.6s;
    }

    @keyframes pulse-out {
      0% {
        opacity: 0.6;
        transform: translateX(-50%) scale(0.8);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scale(1.2);
      }
    }

    .wifi-dot {
      position: absolute;
      left: 50%;
      bottom: 25%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: var(--primary);
      border-radius: 50%;
    }

    .wifi-slash {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      width: 4px;
      height: 85px;
      background: #ef4444;
      border-radius: 4px;
    }

    /* Typography */
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    /* Tips Section */
    .tips {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .tips-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .tips-list {
      list-style: none;
    }

    .tips-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.9375rem;
      color: var(--text-primary);
      padding: 0.5rem 0;
    }

    .tips-list li:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .tip-icon {
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    /* Retry Button */
    .retry-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 1rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.0625rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .retry-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .retry-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Branding */
    .branding {
      position: fixed;
      bottom: 2rem;
      bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
      text-align: center;
    }

    .branding-logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .branding-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Hidden class for JS detection */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="offline-content">
    <!-- Animated WiFi Icon with Slash -->
    <div class="offline-icon" role="img" aria-label="Sin conexión a internet">
      <div class="wifi-circle"></div>
      <div class="wifi-circle"></div>
      <div class="wifi-circle"></div>
      <div class="wifi-dot"></div>
      <div class="wifi-slash"></div>
    </div>

    <h1>Sin conexión</h1>
    <p class="subtitle">
      Parece que no tenés conexión a internet. 
      Revisá tu conexión e intentá nuevamente.
    </p>

    <!-- Tips -->
    <div class="tips">
      <p class="tips-title">¿Qué podés hacer?</p>
      <ul class="tips-list">
        <li>
          <span class="tip-icon">📶</span>
          <span>Verificá que estés conectado al WiFi del restaurante</span>
        </li>
        <li>
          <span class="tip-icon">📱</span>
          <span>Activá los datos móviles si el WiFi no funciona</span>
        </li>
        <li>
          <span class="tip-icon">🔄</span>
          <span>Tocá "Reintentar" cuando tengas conexión</span>
        </li>
      </ul>
    </div>

    <!-- Retry Button -->
    <button class="retry-btn" onclick="retryConnection()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Reintentar
    </button>
  </div>

  <!-- Branding -->
  <div class="branding">
    <div class="branding-logo">🍽️ Sabor</div>
    <p class="branding-text">Menú Digital</p>
  </div>

  <script>
    // Retry connection
    function retryConnection() {
      // Check if now online
      if (navigator.onLine) {
        window.location.reload();
      } else {
        // Try to fetch the home page to trigger a reload when it succeeds
        fetch('/')
          .then(() => window.location.reload())
          .catch(() => {
            // Show brief feedback that we're still offline
            const btn = document.querySelector('.retry-btn');
            btn.textContent = 'Aún sin conexión...';
            setTimeout(() => {
              btn.innerHTML = `
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Reintentar
              `;
            }, 2000);
          });
      }
    }

    // Auto-reload when connection comes back
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
